server:
  port: 8080

spring:
  application:
    name: issueflow
  datasource:
    url: jdbc:postgresql://localhost:5432/issueflow
    username: issueflow
    password: issueflow
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate.jdbc.time_zone: UTC
  sql:
    init:
      mode: never
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# ---- Application-specific settings (slice 3) --------------------------------
jwt:
  # HS256 secret. JWT_SECRET env var wins for production. The fallback is a
  # CLEARLY-MARKED dev secret so `./mvnw spring-boot:run` works out of the box
  # for reviewers without extra setup; JwtService logs a WARN at startup when
  # it's in use. 64+ chars / well over the 32-byte HS256 minimum.
  secret: ${JWT_SECRET:dev-only-jwt-secret-please-override-via-JWT_SECRET-env-var-in-prod-1234567890}
  # Token lifetime in seconds (spec 02 §1: 3600 = 1h).
  expires-in-seconds: 3600
  issuer: issueflow

app:
  seed:
    admin:
      # If true and no ADMIN exists, create a default admin/admin user at startup.
      # WARN-logged. Disable in production.
      enabled: true
      username: admin
      password: admin
      email: admin@issueflow.local
      full-name: Default Admin

logging:
  level:
    com.att.tdp.issueflow: INFO
